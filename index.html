<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Word Saver + Gemini AI</title>

  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #111;
      color: white;
      padding: 20px;
      max-width: 600px;
      margin: auto;
    }

    h1 { color: #ff4b2b; text-align: center; }
    h3 { border-bottom: 1px solid #333; padding-bottom: 5px; margin-top: 25px; }

    input, textarea, button {
      padding: 12px;
      margin: 8px 0;
      width: 100%;
      box-sizing: border-box;
      border-radius: 8px;
      border: 1px solid #333;
      background: #222;
      color: white;
    }

    button {
      background: linear-gradient(to right, #ff416c, #ff4b2b);
      border: none;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover { opacity: 0.9; }
    button:disabled { background: #555; cursor: not-allowed; }

    .card {
      background: #1a1a1a;
      padding: 12px;
      margin-top: 10px;
      border-radius: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border: 1px solid #333;
    }

    .delete-btn { width: auto; background: #444; padding: 5px 10px; font-size: 12px; }

    #aiResponse {
      background: #0f172a;
      border-left: 4px solid #38bdf8;
      padding: 15px;
      margin-top: 15px;
      border-radius: 4px;
      white-space: pre-wrap;
      font-size: 14px;
    }

    .loader { color: #38bdf8; font-size: 14px; display: none; margin-top: 10px; text-align: center; }
  </style>
</head>

<body>

<h1>🔥 Word Saver + AI</h1>

<button onclick="login()">Login with Google</button>

<section>
  <h3>1. Save a Word</h3>
  <input id="wordInput" placeholder="Type a word to save...">
  <button onclick="addWord()">Save to Cloud</button>
</section>

<section>
  <h3>2. Ask Gemini AI</h3>
  <textarea id="aiInput" rows="3" placeholder="Example: Use my saved words in a sentence..."></textarea>
  <button id="askBtn" onclick="askAI()">Ask Gemini</button>
  <div id="aiLoader" class="loader">✨ Gemini is thinking...</div>
  <div id="aiResponse" style="display:none;"></div>
</section>

<section>
  <h3>Your Saved Collection</h3>
  <div id="list"></div>
</section>

import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.
